{{define "headlinks"}}
<link rel="stylesheet" href="/static/style.css">
{{if .Accent}}<style>:root{ --accent: {{.Accent}}; }</style>{{end}}
{{if .CustomCSS}}<link rel="stylesheet" href="/custom.css">{{end}}
{{end}}

{{define "sidebar"}}
<aside class="sidebar">
  <a class="brand" href="/">🌳 {{.SiteTitle}}</a>
  <form class="search" action="/search" method="get" role="search">
    <input type="search" name="q" placeholder="Search…" value="{{.Query}}" aria-label="Search">
  </form>
  <a class="nav-link section{{if eq .Active "proposals"}} active{{end}}" href="/proposals">Proposals{{if .Pending}} <span class="badge">{{.Pending}}</span>{{end}}</a>
  <nav>
    {{range .Pages}}<a class="nav-link{{if eq .Slug $.Active}} active{{end}}" href="/wiki/{{.Slug}}">{{.Title}}</a>
    {{else}}<span class="muted">No pages yet.</span>{{end}}
  </nav>
</aside>
{{end}}
